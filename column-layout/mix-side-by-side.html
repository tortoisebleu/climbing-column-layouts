<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climbing Area - Blue Green mix-side-by-side</title>
  
  <style>
    /* ===== Base ===== */
    .area-portfolio {
      font-family: sans-serif;
      color: #333;
      width: 100%;
    }

    /* ===== Wrapper（横並び用） ===== */
    .area-grid-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

　/* ===== Wrapper 直下の div（height: 100% を機能させるため） ===== */
    .area-grid-wrapper > div {
      display: flex;
      flex-direction: column;
    }
    

    /* ===== Country tag ===== */
    .country-tag {
      font-size: 1.1em;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(#829ebc, #225588);
      padding: 8px 15px;
      margin: 0 0 10px 0;
      border-radius: 4px;
      display: inline-block;
    }

    /* ===== Mint green variant ===== */
    .country-tag.mint {
      background: linear-gradient(#bed3ca, #5a9a8a);
    }

    /* ===== Card ===== */
    .area-card {
      display: flex;
      background: #fff;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .area-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      border-color: #225588;
    }

    .area-card.mint:hover {
      border-color: #5a9a8a;
    }

    /* ===== Card image ===== */
    .area-img {
      width: 100px;
      min-width: 100px;
      height: 100%;        /* ← auto から変更：縦伸び防止 */
      object-fit: cover;
      display: block;
      align-self: stretch;　　　/* ← 追加 */
    }

    /* ===== Card info ===== */
    .area-info {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .area-name {
      font-weight: bold;
      color: #225588;
      margin-bottom: 4px;
      font-size: 1rem;
      display: flex;
      align-items: center;
    }

    .area-card.mint .area-name {
      color: #3a7a6a;
    }

    .area-name::before {
      content: "";
      border-style: solid;
      border-width: 4px 0 4px 6px;
      border-color: transparent transparent transparent #829ebc;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .area-card.mint .area-name::before {
      border-color: transparent transparent transparent #bed3ca;
    }

    .area-meta {
      font-size: 0.8rem;
      color: #666;
    }

    .area-ambiance {
      font-size: 0.75rem;
      color: #e67e22;
      font-style: italic;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- 簡易メニュー（自分用） -->
  <nav style="margin: 20px 0; font-family: sans-serif;">
    <a href="green.html">緑版</a> | 
    <a href="blue.html">青版</a> | 
    <a href="mix-side-by-side.html">混合（横）</a> | 
    <a href="mix-stacked.html">混合（縦）</a>
  </nav>

  <div class="area-portfolio">
    <div class="area-grid-wrapper">

      <!-- ===== Meteora（青テーマ） ===== -->
      <div>
        <div class="country-tag">🇬🇷 Grèce : Meteora</div>
        <a href="https://escalade.amebaownd.com/posts/8107802" class="area-card">
          <img class="area-img" src="https://cdn.amebaowndme.com/madrid-prd/madrid-web/images/sites/499076/1ea40f750a3da5fd23be3e9b7bc57e35_0fd17b63abbf6084eacb45b9e7f16862.jpg?width=400" alt="Meteora" loading="lazy" width="100" height="100"/>
          <div class="area-info">
            <div class="area-name">Meteora – ハイキング</div>
            <div class="area-meta">« 修道院ハイキング »</div>
            <div class="area-ambiance">✨ 奇岩群の中、修道院を歩いて巡る6時間の旅</div>
          </div>
        </a>
      </div>

      <!-- ===== クライミング旅行記（緑テーマ） ===== -->
      <div>
        <div class="country-tag mint">私のクライミング旅行記</div>
        <a href="https://escalade.amebaownd.com/posts/58544935" class="area-card mint">
          <img class="area-img" src="https://cdn.amebaowndme.com/madrid-prd/madrid-web/images/sites/499076/6645cfd1135492e45f38d5ca31a7c448_36aeee59e1634855d218e41d94c10703.jpg?width=400" alt="Travelogue" loading="lazy" width="100" height="100"/>
          <div class="area-info">
            <div class="area-name">ヨーロッパ クライミング紀行</div>
            <div class="area-meta">« 岩場・トポ・宿泊の実践ガイド »</div>
            <div class="area-ambiance">✨ ヨーロッパ各地の岩場を実体験でまとめた総合ガイド</div>
          </div>
        </a>
      </div>

    </div>
  </div>

</body>
</html>
