<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スライド ディゾルブ (40秒)</title>

<style>
  .slide {
    position: relative;
    width: 100%;
    padding-top: 75%; /* ここを 60% から 75% に戻すと、最初の大きさになります */
    overflow: hidden;
    background-color: #ffffff;
  }

  .slide img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    /* 全体で40秒（4秒 × 10枚） */
    animation: quickCrossDissolve 40s linear infinite;
  }

  @keyframes quickCrossDissolve {
    0% { opacity: 0; }
    4% { opacity: 1; }   /* 約1.6秒で登場 */
    12% { opacity: 1; }  /* 約4.8秒地点まで表示を維持 */
    20% { opacity: 0; }  /* 約3.2秒かけてゆっくり退場（ここで次と重なる） */
    100% { opacity: 0; }
  }

  /* 4秒（全体の10%）ずつずらして開始 */
  .slide img:nth-child(1) { animation-delay: 0s; }
  .slide img:nth-child(2) { animation-delay: 4s; }
  .slide img:nth-child(3) { animation-delay: 8s; }
  .slide img:nth-child(4) { animation-delay: 12s; }
  .slide img:nth-child(5) { animation-delay: 16s; }
  .slide img:nth-child(6) { animation-delay: 20s; }
  .slide img:nth-child(7) { animation-delay: 24s; }
  .slide img:nth-child(8) { animation-delay: 28s; }
  .slide img:nth-child(9) { animation-delay: 32s; }
  .slide img:nth-child(10) { animation-delay: 36s; }
</style>
</head>
  
<body>
<div class="slide">

<img src="https://cdn.amebaowndme.com/madrid-prd/madrid-web/images/sites/499076/16b8746ab1c400692006834b51f33ae4_8b9cf7da2aba697711871ae8caf114a1.jpg" alt="Strasbourg">
