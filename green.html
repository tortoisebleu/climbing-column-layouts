<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climbing Area - Green Layout</title>
  
  <style>
    /* ===== Base ===== */
    .area-portfolio {
      font-family: sans-serif;
      color: #333;
      width: 100%;
    }

    /* ===== Country tag ===== */
    .country-tag {
      font-size: 1.1em;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(#bed3ca, #5a9a8a); /* ← 緑に変更 */
      padding: 8px 15px;
      margin: 30px 0 15px 0;
      border-radius: 4px;
      display: inline-block;
    }

    /* ===== Grid ===== */
    .area-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

    /* ===== Card ===== */
    .area-card {
      display: flex;
      background: #fff;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .area-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      border-color: #5a9a8a; /* ← 緑に変更 */
    }

    /* ===== Card image ===== */
    .area-img {
      width: 100px;
      min-width: 100px;
      height: auto;　　　　　/* ← 100px から変更 */
      object-fit: cover;
      display: block;
      align-self: stretch;　 /* ← 追加 */
    }

    /* ===== Card info ===== */
    .area-info {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .area-name {
      font-weight: bold;
      color: #3a7a6a; /* 青→緑に変更 */
      margin-bottom: 4px;
      font-size: 1rem;
      display: flex;
      align-items: center;
    }

    .area-name::before {
      content: "";
      border-style: solid;
      border-width: 4px 0 4px 6px;
      border-color: transparent transparent transparent #bed3ca; /* 青→緑に変更 */
      margin-right: 8px;
      flex-shrink: 0;
    }

    .area-meta {
      font-size: 0.8rem;
      color: #666;
    }

    .area-ambiance {
      font-size: 0.75rem;
      color: #e67e22;
      font-style: italic;
      margin-top: 4px;
    }
  </style>
</head>

  
<body>

  <!-- 簡易メニュー（自分用）：ファイル名を正確に合わせました -->
  
  <nav style="margin: 20px 0; font-family: sans-serif;">
    <a href="green.html">緑版</a> | 
    <a href="blue.html">青版</a> | 
    <a href="mix-side-by-side.html">混合（横）</a> | 
    <a href="mix-stacked.html">混合（縦）</a>
  </nav>

   <!-- ===== 私のクライミング旅行記 ===== -->
  
  <div class="area-portfolio">
    <div class="country-tag">私のクライミング旅行記</div>
    <div class="area-grid">
      <a href="https://escalade.amebaownd.com/posts/58544935" class="area-card">
        <img class="area-img" src="https://cdn.amebaowndme.com/madrid-prd/madrid-web/images/sites/499076/6645cfd1135492e45f38d5ca31a7c448_36aeee59e1634855d218e41d94c10703.jpg?width=400" alt="ヨーロッパ クライミング紀行" loading="lazy" width="100" height="100" />
        <div class="area-info">
          <div class="area-name">ヨーロッパ クライミング紀行</div>
          <div class="area-meta">« 岩場・トポ・宿泊の実践ガイド »</div>
          <div class="area-ambiance">✨ ヨーロッパ各地の岩場を実体験でまとめた総合ガイド</div>
        </div>
      </a>
    </div>
  </div>

</body>
</html>
